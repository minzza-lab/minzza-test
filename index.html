<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예진이에게 보내는 편지</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

        body {
            font-family: 'Nanum Myeongjo', serif;
            margin: 0;
            background-color: #fff5f5; /* 연한 분홍색 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .envelope {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            border: 1px solid #ffe3e3;
        }

        .envelope::before {
            content: "❤️";
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
        }

        h1 {
            color: #d63384; /* 진한 분홍색 */
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #ffe3e3;
            padding-bottom: 1rem;
        }

        .letter-content {
            color: #444;
            line-height: 1.8;
            font-size: 1.1rem;
            white-space: pre-wrap; /* 줄바꿈 유지 */
        }

        .signature {
            margin-top: 3rem;
            text-align: right;
            font-weight: bold;
            color: #d63384;
        }

        .heart-animation {
            text-align: center;
            margin-top: 2rem;
            font-size: 30px;
            animation: beat 1s infinite alternate;
        }

        @keyframes beat {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div class="envelope">
        <h1>사랑하는 예진이에게</h1>
        
        <div class="letter-content">
안녕 예진아,

갑자기 이런 웹사이트를 만들어서 놀랐지? 
공부를 시작하면서 너에게 가장 먼저 내 마음을 전하고 싶었어.

항상 내 곁에서 힘이 되어주고, 
나를 믿어줘서 정말 고마워.

부족한 점이 많지만, 너에게 더 멋진 남편이 되기 위해
이렇게 새로운 도전도 시작해 보려고 해.

세상에서 단 하나뿐인 이 웹사이트처럼, 
너도 나에게 단 하나뿐인 소중한 사람이야.

많이 사랑해!
        </div>

        <div class="signature">
            - 너의 남편으로부터 -
        </div>

        <div class="heart-animation">❤️</div>
    </div>
</body>
</html>
