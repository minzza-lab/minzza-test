<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예진이에게 보내는 편지</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

        body {
            font-family: 'Nanum Myeongjo', serif;
            margin: 0;
            background-color: #fff5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }

        /* 💌 편지 봉투 스타일 */
        .envelope {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(214, 51, 132, 0.15);
            position: relative;
            z-index: 10;
            border: 2px solid #ffe3e3;
            text-align: center;
        }

        /* 📸 사진 스타일 */
        .photo-frame {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 2rem;
            background-color: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .photo-frame img {
            width: 100%;
            height: auto; /* 사진 비율 유지 */
            display: block;
        }

        h1 {
            color: #d63384;
            font-size: 1.8rem;
            margin-bottom: 2rem;
        }

        .letter-content {
            color: #444;
            line-height: 2;
            font-size: 1.2rem;
            white-space: pre-wrap;
            margin-bottom: 2rem;
        }

        .signature {
            text-align: right;
            font-weight: bold;
            color: #d63384;
            font-size: 1.1rem;
        }

        /* ❤️ 퐁퐁 솟아오르는 하트 애니메이션 */
        .heart {
            position: fixed;
            bottom: -50px;
            color: #ff6b6b;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: moveUp 4s linear infinite;
        }

        @keyframes moveUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);
    </script>

    <div class="envelope">
        <div class="photo-frame">
            <!-- 파일명을 대문자 photo.JPG로 수정했습니다! -->
            <img src="photo.JPG" alt="우리 사진">
        </div>

        <h1>❤️ 사랑하는 예진이에게 ❤️</h1>
        
        <div class="letter-content">
예진아 사랑해!

내가 열심히 공부해서 
맛있는 거, 좋은 곳 많이 많이 데려가 줄게.

항상 내 곁에 있어 줘서 고마워.
우리 같이 힘내자! 

사랑해! ✨
        </div>

        <div class="signature">
            - 민혁이가-
        </div>
    </div>
</body>
</html>
