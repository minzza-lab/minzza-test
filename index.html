<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예진이에게 보내는 편지</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap');

        body {
            font-family: 'Nanum Myeongjo', serif;
            margin: 0;
            background-color: #fff5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .envelope {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(214, 51, 132, 0.1);
            position: relative;
            overflow: hidden;
            border: 2px solid #ffe3e3;
            text-align: center;
        }

        h1 {
            color: #d63384;
            font-size: 1.8rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid #ffe3e3;
            padding-bottom: 1rem;
        }

        .letter-content {
            color: #444;
            line-height: 2;
            font-size: 1.2rem;
            white-space: pre-wrap;
            margin-bottom: 2rem;
        }

        .signature {
            margin-top: 3rem;
            text-align: right;
            font-weight: bold;
            color: #d63384;
            font-size: 1.1rem;
        }

        .heart-animation {
            font-size: 40px;
            animation: beat 0.8s infinite alternate;
            margin: 20px 0;
        }

        @keyframes beat {
            from { transform: scale(1); }
            to { transform: scale(1.3); }
        }

        .sparkle {
            color: #ffd43b;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="envelope">
        <h1>❤️ 사랑하는 예진이에게 ❤️</h1>
        
        <div class="letter-content">
예진아 사랑해!

내가 열심히 공부해서 
맛있는 거, 좋은 곳 많이 많이 데려가 줄게.

항상 내 곁에 있어 줘서 고마워.
우리 같이 힘내자! 

사랑해! ✨
        </div>

        <div class="heart-animation">❤️</div>

        <div class="signature">
            - 사랑하는 남편이 -
        </div>
    </div>
</body>
</html>
